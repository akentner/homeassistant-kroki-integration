reload:
  name: Reload
  description: Reload Kroki image entities from YAML configuration.

force_render:
  name: Force Render
  description: >
    Forces an immediate re-render of one or more Kroki diagram entities,
    bypassing the hash-based dedup cache and disk cache. Useful when the
    diagram source has changed externally or when you want to force a refresh.
  fields:
    entity_id:
      name: Entity
      description: One or more Kroki diagram image entities to force-render.
      required: true
      selector:
        entity:
          integration: kroki
          domain: image
          multiple: true
