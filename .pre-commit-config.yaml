# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # CI validation hooks (manual only — run with: pre-commit run hassfest --all-files)
  # These require Docker and pull images from GitHub Container Registry.
  # They mirror the GitHub Actions CI pipeline for local testing.
  - repo: local
    hooks:
      - id: hassfest
        name: hassfest
        entry: bash -c 'docker run --rm -v "$(pwd):/github/workspace" ghcr.io/home-assistant/actions/hassfest:latest'
        language: system
        pass_filenames: false
        stages: [manual]

      - id: hacs-validate
        name: HACS validation
        entry: bash -c 'docker run --rm -v "$(pwd):/github/workspace" -e "INPUT_CATEGORY=integration" ghcr.io/hacs/action:main'
        language: system
        pass_filenames: false
        stages: [manual]
